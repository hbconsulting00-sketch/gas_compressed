<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>משחק טריוויה - גז דחוס | מסך מנחה</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f0f4f8 0%, #e8f2f7 100%);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* אלמנטי רקע - בועות גז */
        .gas-bubble {
            position: fixed;
            background: radial-gradient(circle at 30% 30%, rgba(100, 181, 246, 0.15), rgba(66, 165, 245, 0.05));
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            animation: float-up 15s infinite ease-in-out;
        }

        .gas-bubble:nth-child(1) {
            width: 200px;
            height: 200px;
            top: 10%;
            left: 5%;
            animation-delay: 0s;
        }

        .gas-bubble:nth-child(2) {
            width: 150px;
            height: 150px;
            top: 60%;
            left: 80%;
            animation-delay: 3s;
        }

        .gas-bubble:nth-child(3) {
            width: 180px;
            height: 180px;
            top: 40%;
            left: 15%;
            animation-delay: 6s;
        }

        @keyframes float-up {
            0%, 100% { transform: translateY(0px) scale(1); opacity: 0.6; }
            50% { transform: translateY(-30px) scale(1.05); opacity: 0.8; }
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px;
            position: relative;
            z-index: 1;
        }

        /* כותרת */
        .header {
            text-align: center;
            margin-bottom: 40px;
            background: white;
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 8px 30px rgba(66, 165, 245, 0.15);
        }

        .header h1 {
            font-size: 3em;
            color: #1976D2;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .header h1::before,
        .header h1::after {
            content: "💨";
            font-size: 0.7em;
        }

        .subtitle {
            color: #546E7A;
            font-size: 1.2em;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .n2-badge {
            background: linear-gradient(135deg, #42A5F5, #1976D2);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9em;
        }

        /* מסך לובי */
        #lobby {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            padding: 35px;
            border-radius: 25px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
        }

        .card h2 {
            color: #1976D2;
            margin-bottom: 25px;
            font-size: 1.8em;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #qrcode {
            text-align: center;
            padding: 20px;
            background: linear-gradient(135deg, #E3F2FD, #BBDEFB);
            border-radius: 20px;
            margin-bottom: 20px;
        }

        #playerUrl {
            display: block;
            margin-top: 15px;
            padding: 15px;
            background: white;
            border-radius: 15px;
            color: #1976D2;
            font-weight: bold;
            word-break: break-all;
            font-size: 0.95em;
        }

        #playersList {
            display: grid;
            gap: 12px;
            max-height: 400px;
            overflow-y: auto;
        }

        .player-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            background: linear-gradient(135deg, #E3F2FD, #F5F5F5);
            border-radius: 15px;
            transition: all 0.3s ease;
        }

        .player-item:hover {
            transform: translateX(-5px);
            box-shadow: 0 4px 15px rgba(66, 165, 245, 0.2);
        }

        .player-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #42A5F5, #1976D2);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.3em;
        }

        .player-name {
            flex: 1;
            font-size: 1.2em;
            color: #263238;
            font-weight: 500;
        }

        .start-btn {
            width: 100%;
            padding: 20px;
            background: linear-gradient(135deg, #66BB6A, #43A047);
            color: white;
            border: none;
            border-radius: 20px;
            font-size: 1.5em;
            font-weight: bold;
            cursor: pointer;
            margin-top: 25px;
            transition: all 0.3s ease;
            box-shadow: 0 6px 20px rgba(67, 160, 71, 0.3);
        }

        .start-btn:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(67, 160, 71, 0.4);
        }

        .start-btn:disabled {
            background: #B0BEC5;
            cursor: not-allowed;
            box-shadow: none;
        }

        /* מסך משחק */
        #gameScreen {
            display: none;
        }

        .game-layout {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }

        .question-card {
            background: white;
            padding: 40px;
            border-radius: 25px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
        }

        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 3px solid #E3F2FD;
        }

        .question-number {
            background: linear-gradient(135deg, #42A5F5, #1976D2);
            color: white;
            padding: 10px 25px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 1.2em;
        }

        .timer-display {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 2em;
            font-weight: bold;
            color: #1976D2;
        }

        .timer-circle {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            border: 6px solid #42A5F5;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(66, 165, 245, 0.2);
        }

        .timer-circle.warning {
            border-color: #FF9800;
            animation: pulse-warning 1s infinite;
        }

        .timer-circle.danger {
            border-color: #F44336;
            animation: pulse-danger 0.5s infinite;
        }

        @keyframes pulse-warning {
            0%, 100% { box-shadow: 0 4px 15px rgba(255, 152, 0, 0.3); }
            50% { box-shadow: 0 4px 25px rgba(255, 152, 0, 0.6); }
        }

        @keyframes pulse-danger {
            0%, 100% { box-shadow: 0 4px 15px rgba(244, 67, 54, 0.3); }
            50% { box-shadow: 0 4px 25px rgba(244, 67, 54, 0.7); }
        }

        .question-text {
            font-size: 2em;
            color: #263238;
            margin-bottom: 30px;
            line-height: 1.4;
        }

        .question-image {
            width: 100%;
            max-height: 350px;
            object-fit: cover;
            border-radius: 20px;
            margin-bottom: 30px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.1);
        }

        .answers-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .answer-option {
            padding: 25px;
            border-radius: 20px;
            font-size: 1.3em;
            font-weight: 500;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .answer-option.option-a {
            background: linear-gradient(135deg, #EF5350, #E53935);
            color: white;
        }

        .answer-option.option-b {
            background: linear-gradient(135deg, #42A5F5, #1976D2);
            color: white;
        }

        .answer-option.option-c {
            background: linear-gradient(135deg, #FFA726, #FB8C00);
            color: white;
        }

        .answer-option.option-d {
            background: linear-gradient(135deg, #AB47BC, #8E24AA);
            color: white;
        }

        .answer-count {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(255, 255, 255, 0.95);
            color: #263238;
            padding: 5px 15px;
            border-radius: 15px;
            font-size: 0.8em;
            font-weight: bold;
        }

        /* לוח תוצאות */
        .scoreboard-card {
            background: white;
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
            max-height: 600px;
            overflow-y: auto;
        }

        .scoreboard-card h3 {
            color: #1976D2;
            margin-bottom: 20px;
            font-size: 1.5em;
            text-align: center;
        }

        .scoreboard-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #F5F5F5, #E3F2FD);
            border-radius: 15px;
            transition: all 0.3s ease;
        }

        .scoreboard-item:nth-child(1) .rank {
            background: linear-gradient(135deg, #FFD700, #FFA000);
        }

        .scoreboard-item:nth-child(2) .rank {
            background: linear-gradient(135deg, #C0C0C0, #9E9E9E);
        }

        .scoreboard-item:nth-child(3) .rank {
            background: linear-gradient(135deg, #CD7F32, #A0522D);
        }

        .rank {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #42A5F5, #1976D2);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.1em;
        }

        .score-info {
            flex: 1;
        }

        .score-name {
            font-weight: 600;
            color: #263238;
            margin-bottom: 3px;
        }

        .score-points {
            color: #546E7A;
            font-size: 0.9em;
        }

        .score-total {
            font-weight: bold;
            font-size: 1.4em;
            color: #1976D2;
        }

        /* כפתור חשיפה */
        .reveal-section {
            text-align: center;
            margin-top: 30px;
        }

        .reveal-btn {
            padding: 20px 60px;
            background: linear-gradient(135deg, #66BB6A, #43A047);
            color: white;
            border: none;
            border-radius: 20px;
            font-size: 1.5em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 6px 20px rgba(67, 160, 71, 0.3);
        }

        .reveal-btn:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(67, 160, 71, 0.4);
        }

        .reveal-btn:disabled {
            background: #B0BEC5;
            cursor: not-allowed;
            box-shadow: none;
        }

        .reveal-btn.ready {
            animation: pulse-ready 1.5s infinite;
        }

        @keyframes pulse-ready {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .waiting-text {
            margin-top: 15px;
            color: #546E7A;
            font-size: 1.1em;
        }

        /* מסך תוצאות סופי */
        #finalScreen {
            display: none;
            text-align: center;
        }

        .podium {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 20px;
            margin: 50px 0;
        }

        .podium-place {
            background: white;
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.1);
            min-width: 200px;
        }

        .podium-place.first {
            background: linear-gradient(135deg, #FFD700, #FFA000);
            transform: translateY(-20px);
        }

        .podium-place.second {
            background: linear-gradient(135deg, #C0C0C0, #9E9E9E);
        }

        .podium-place.third {
            background: linear-gradient(135deg, #CD7F32, #A0522D);
        }

        .podium-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: white;
            color: #1976D2;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5em;
            font-weight: bold;
            margin: 0 auto 20px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
        }

        .podium-name {
            font-size: 1.5em;
            font-weight: bold;
            color: white;
            margin-bottom: 10px;
        }

        .podium-score {
            font-size: 2em;
            font-weight: bold;
            color: white;
        }

        .restart-btn {
            padding: 20px 60px;
            background: linear-gradient(135deg, #42A5F5, #1976D2);
            color: white;
            border: none;
            border-radius: 20px;
            font-size: 1.3em;
            font-weight: bold;
            cursor: pointer;
            margin-top: 40px;
            transition: all 0.3s ease;
            box-shadow: 0 6px 20px rgba(66, 165, 245, 0.3);
        }

        .restart-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(66, 165, 245, 0.4);
        }

        /* Responsive */
        @media (max-width: 768px) {
            #lobby, .game-layout {
                grid-template-columns: 1fr;
            }
            
            .answers-grid {
                grid-template-columns: 1fr;
            }
            
            .header h1 {
                font-size: 2em;
            }
            
            .question-text {
                font-size: 1.5em;
            }
        }
    </style>
</head>
<body>
    <!-- בועות גז ברקע -->
    <div class="gas-bubble"></div>
    <div class="gas-bubble"></div>
    <div class="gas-bubble"></div>

    <div class="container">
        <div class="header">
            <h1>🎯 משחק טריוויה גז דחוס</h1>
            <div class="subtitle">
                <span class="n2-badge">N₂</span>
                <span>בטיחות ומודעות לעבודה עם גזים</span>
                <span class="n2-badge">6 BAR</span>
            </div>
        </div>

        <!-- מסך לובי -->
        <div id="lobby">
            <div class="card">
                <h2>📱 הצטרפות למשחק</h2>
                <div id="qrcode"></div>
                <span id="playerUrl"></span>
            </div>
            <div class="card">
                <h2>👥 שחקנים (<span id="playerCount">0</span>)</h2>
                <div id="playersList"></div>
                <button class="start-btn" id="startBtn">🚀 התחל משחק</button>
            </div>
        </div>

        <!-- מסך משחק -->
        <div id="gameScreen">
            <div class="game-layout">
                <div class="question-card">
                    <div class="question-header">
                        <span class="question-number" id="questionNumber">שאלה 1/10</span>
                        <div class="timer-display">
                            <div class="timer-circle" id="timerCircle">
                                <span id="timerText">30</span>
                            </div>
                        </div>
                    </div>
                    <div class="question-text" id="questionText"></div>
                    <img id="questionImage" class="question-image" style="display: none;">
                    <div class="answers-grid" id="answersGrid"></div>
                </div>

                <div class="scoreboard-card">
                    <h3>🏆 לוח תוצאות</h3>
                    <div id="liveScoreboard"></div>
                </div>
            </div>

            <div class="reveal-section">
                <button class="reveal-btn" id="revealBtn" disabled>🔍 חשוף תשובה נכונה</button>
                <div class="waiting-text" id="waitingText"></div>
            </div>
        </div>

        <!-- מסך תוצאות סופי -->
        <div id="finalScreen">
            <h1 style="font-size: 3em; color: #1976D2; margin-bottom: 30px;">🎉 המשחק הסתיים!</h1>
            <div class="podium" id="podium"></div>
            <button class="restart-btn" onclick="location.reload()">🔄 משחק חדש</button>
        </div>
    </div>

    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyA2_sajeisUbl0S3hePbxfcZMKHnfO8mX8",
            authDomain: "hb-ergonomics.firebaseapp.com",
            databaseURL: "https://hb-ergonomics-default-rtdb.firebaseio.com",
            projectId: "hb-ergonomics",
            storageBucket: "hb-ergonomics.firebasestorage.app",
            messagingSenderId: "999618112514",
            appId: "1:999618112514:web:0c9da1f0b448a28aa48b1b"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const gameId = 'game_' + Date.now();

        // State
        let questions = [];
        let currentQuestionIndex = 0;
        let timer = null;
        let timeLeft = 30;

        // טעינת שאלות
        fetch('questions.json')
            .then(res => res.json())
            .then(data => {
                questions = data.questions;
            });

        // יצירת QR Code
        const baseUrl = 'https://hbconsulting00-sketch.github.io/gas_compressed/';
        const playerUrl = baseUrl + 'player.html?game=' + gameId;
        document.getElementById('playerUrl').textContent = playerUrl;
        
        // יצירת QR באמצעות QRCode.js
        new QRCode(document.getElementById('qrcode'), {
            text: playerUrl,
            width: 250,
            height: 250,
            colorDark: '#1976D2',
            colorLight: '#FFFFFF',
            correctLevel: QRCode.CorrectLevel.H
        });

        // האזנה לשחקנים
        db.ref(`games/${gameId}/players`).on('value', (snapshot) => {
            const players = snapshot.val() || {};
            const playerCount = Object.keys(players).length;
            
            document.getElementById('playerCount').textContent = playerCount;
            
            const playersList = document.getElementById('playersList');
            playersList.innerHTML = '';
            
            Object.entries(players).forEach(([id, player]) => {
                const div = document.createElement('div');
                div.className = 'player-item';
                div.innerHTML = `
                    <div class="player-avatar">${player.name.charAt(0).toUpperCase()}</div>
                    <div class="player-name">${player.name}</div>
                `;
                playersList.appendChild(div);
            });
        });

        // התחלת משחק
        document.getElementById('startBtn').addEventListener('click', () => {
            document.getElementById('lobby').style.display = 'none';
            document.getElementById('gameScreen').style.display = 'block';
            
            db.ref(`games/${gameId}/state`).set({
                status: 'playing',
                currentQuestion: 0
            });
            
            showQuestion(0);
        });

        // הצגת שאלה
        function showQuestion(index) {
            if (index >= questions.length) {
                showFinalResults();
                return;
            }

            currentQuestionIndex = index;
            const q = questions[index];
            
            document.getElementById('questionNumber').textContent = `שאלה ${index + 1}/${questions.length}`;
            document.getElementById('questionText').textContent = q.question;
            
            const imgEl = document.getElementById('questionImage');
            if (q.image) {
                imgEl.src = q.image;
                imgEl.style.display = 'block';
            } else {
                imgEl.style.display = 'none';
            }
            
            const answersGrid = document.getElementById('answersGrid');
            answersGrid.innerHTML = '';
            
            q.answers.forEach((answer, i) => {
                const div = document.createElement('div');
                div.className = `answer-option option-${String.fromCharCode(97 + i)}`;
                div.innerHTML = `
                    <span class="answer-count" id="count-${i}">0</span>
                    ${answer}
                `;
                answersGrid.appendChild(div);
            });
            
            db.ref(`games/${gameId}/questions/${index}`).set({
                question: q.question,
                answers: q.answers,
                correctAnswer: q.correctAnswer,
                image: q.image || null,
                startTime: Date.now()
            });
            
            startTimer();
            updateScoreboard();
            
            // האזנה לתשובות
            db.ref(`games/${gameId}/answers/${index}`).on('value', (snapshot) => {
                const answers = snapshot.val() || {};
                const counts = [0, 0, 0, 0];
                const totalAnswers = Object.keys(answers).length;
                
                Object.values(answers).forEach(a => {
                    if (a.answer >= 0 && a.answer < 4) {
                        counts[a.answer]++;
                    }
                });
                
                counts.forEach((count, i) => {
                    const el = document.getElementById(`count-${i}`);
                    if (el) el.textContent = count;
                });
                
                db.ref(`games/${gameId}/players`).once('value', (playersSnap) => {
                    const totalPlayers = Object.keys(playersSnap.val() || {}).length;
                    const waitingText = document.getElementById('waitingText');
                    
                    if (totalAnswers >= totalPlayers && totalPlayers > 0) {
                        document.getElementById('revealBtn').disabled = false;
                        document.getElementById('revealBtn').classList.add('ready');
                        waitingText.textContent = '✅ כולם ענו!';
                    } else {
                        const waiting = totalPlayers - totalAnswers;
                        waitingText.textContent = `⏳ ממתינים ל-${waiting} שחקנים...`;
                    }
                });
            });
        }

        // טיימר
        function startTimer() {
            timeLeft = 30;
            updateTimerDisplay();
            
            clearInterval(timer);
            timer = setInterval(() => {
                timeLeft--;
                updateTimerDisplay();
                
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    document.getElementById('revealBtn').disabled = false;
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            const circle = document.getElementById('timerCircle');
            const text = document.getElementById('timerText');
            
            text.textContent = timeLeft;
            
            circle.classList.remove('warning', 'danger');
            if (timeLeft <= 10 && timeLeft > 5) {
                circle.classList.add('warning');
            } else if (timeLeft <= 5) {
                circle.classList.add('danger');
            }
        }

        // חשיפת תשובה
        document.getElementById('revealBtn').addEventListener('click', () => {
            clearInterval(timer);
            
            const q = questions[currentQuestionIndex];
            db.ref(`games/${gameId}/revealed/${currentQuestionIndex}`).set({
                correctAnswer: q.correctAnswer,
                timestamp: Date.now()
            });
            
            setTimeout(() => {
                document.getElementById('revealBtn').disabled = true;
                document.getElementById('revealBtn').classList.remove('ready');
                
                setTimeout(() => {
                    if (currentQuestionIndex < questions.length - 1) {
                        showQuestion(currentQuestionIndex + 1);
                    } else {
                        showFinalResults();
                    }
                }, 3000);
            }, 2000);
        });

        // עדכון לוח תוצאות
        function updateScoreboard() {
            db.ref(`games/${gameId}/players`).on('value', (snapshot) => {
                const players = snapshot.val() || {};
                const scoreboard = Object.entries(players)
                    .map(([id, p]) => ({
                        id,
                        name: p.name,
                        score: p.score || 0
                    }))
                    .sort((a, b) => b.score - a.score);
                
                const container = document.getElementById('liveScoreboard');
                container.innerHTML = '';
                
                scoreboard.forEach((player, index) => {
                    const div = document.createElement('div');
                    div.className = 'scoreboard-item';
                    div.innerHTML = `
                        <div class="rank">${index + 1}</div>
                        <div class="score-info">
                            <div class="score-name">${player.name}</div>
                        </div>
                        <div class="score-total">${player.score}</div>
                    `;
                    container.appendChild(div);
                });
            });
        }

        // תוצאות סופיות
        function showFinalResults() {
            document.getElementById('gameScreen').style.display = 'none';
            document.getElementById('finalScreen').style.display = 'block';
            
            db.ref(`games/${gameId}/state`).update({ status: 'finished' });
            
            db.ref(`games/${gameId}/players`).once('value', (snapshot) => {
                const players = Object.entries(snapshot.val() || {})
                    .map(([id, p]) => ({ name: p.name, score: p.score || 0 }))
                    .sort((a, b) => b.score - a.score);
                
                const podium = document.getElementById('podium');
                podium.innerHTML = '';
                
                const places = ['second', 'first', 'third'];
                const positions = [1, 0, 2];
                
                positions.forEach((i) => {
                    if (players[i]) {
                        const div = document.createElement('div');
                        div.className = `podium-place ${places[positions.indexOf(i)]}`;
                        div.innerHTML = `
                            <div class="podium-avatar">${players[i].name.charAt(0).toUpperCase()}</div>
                            <div class="podium-name">${players[i].name}</div>
                            <div class="podium-score">${players[i].score} נקודות</div>
                        `;
                        podium.appendChild(div);
                    }
                });
            });
        }
    </script>
</body>
</html>
