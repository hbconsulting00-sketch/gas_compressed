<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>משחק טריוויה - גז דחוס | שחקן</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f0f4f8 0%, #e8f2f7 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        .gas-bubble {
            position: fixed;
            background: radial-gradient(circle at 30% 30%, rgba(100, 181, 246, 0.15), rgba(66, 165, 245, 0.05));
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            animation: float-up 15s infinite ease-in-out;
        }

        .gas-bubble:nth-child(1) {
            width: 150px;
            height: 150px;
            top: 10%;
            left: 5%;
        }

        .gas-bubble:nth-child(2) {
            width: 120px;
            height: 120px;
            top: 70%;
            right: 10%;
            animation-delay: 5s;
        }

        @keyframes float-up {
            0%, 100% { transform: translateY(0px); opacity: 0.6; }
            50% { transform: translateY(-20px); opacity: 0.9; }
        }

        .container {
            width: 100%;
            max-width: 500px;
            position: relative;
            z-index: 1;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 10px 40px rgba(66, 165, 245, 0.2);
            text-align: center;
        }

        .logo {
            font-size: 4em;
            margin-bottom: 20px;
        }

        h1 {
            color: #1976D2;
            font-size: 2em;
            margin-bottom: 15px;
        }

        .subtitle {
            color: #546E7A;
            margin-bottom: 30px;
            font-size: 1.1em;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .n2-badge {
            background: linear-gradient(135deg, #42A5F5, #1976D2);
            color: white;
            padding: 4px 12px;
            border-radius: 15px;
            font-weight: bold;
            font-size: 0.9em;
        }

        input {
            width: 100%;
            padding: 18px;
            border: 3px solid #E3F2FD;
            border-radius: 20px;
            font-size: 1.2em;
            text-align: center;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: #42A5F5;
            box-shadow: 0 0 0 4px rgba(66, 165, 245, 0.1);
        }

        .icon-selector {
            margin-bottom: 25px;
        }

        .icon-selector-label {
            color: #546E7A;
            font-size: 1em;
            margin-bottom: 15px;
            display: block;
        }

        .icon-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }

        .icon-option {
            width: 100%;
            aspect-ratio: 1;
            font-size: 3em;
            border: 3px solid #E3F2FD;
            border-radius: 20px;
            background: white;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon-option:hover {
            transform: scale(1.05);
            border-color: #42A5F5;
        }

        .icon-option.selected {
            border-color: #42A5F5;
            background: linear-gradient(135deg, #E3F2FD, #BBDEFB);
            box-shadow: 0 4px 15px rgba(66, 165, 245, 0.3);
        }

        button {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #66BB6A, #43A047);
            color: white;
            border: none;
            border-radius: 20px;
            font-size: 1.3em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 6px 20px rgba(67, 160, 71, 0.3);
        }

        button:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(67, 160, 71, 0.4);
        }

        button:disabled {
            background: #B0BEC5;
            cursor: not-allowed;
            box-shadow: none;
        }

        #waitingScreen {
            display: none;
        }

        .spinner {
            width: 80px;
            height: 80px;
            margin: 30px auto;
            border: 8px solid #E3F2FD;
            border-top: 8px solid #42A5F5;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .waiting-text {
            font-size: 1.5em;
            color: #546E7A;
            margin-top: 20px;
        }

        #questionScreen {
            display: none;
        }

        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 3px solid #E3F2FD;
        }

        .question-number {
            background: linear-gradient(135deg, #42A5F5, #1976D2);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: bold;
        }

        .timer-circle {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            border: 5px solid #42A5F5;
            font-size: 1.5em;
            font-weight: bold;
            color: #1976D2;
            transition: all 0.3s ease;
        }

        .timer-circle.warning {
            border-color: #FF9800;
        }

        .timer-circle.danger {
            border-color: #F44336;
            animation: pulse-danger 0.5s infinite;
        }

        @keyframes pulse-danger {
            0%, 100% { box-shadow: 0 4px 15px rgba(244, 67, 54, 0.3); }
            50% { box-shadow: 0 4px 25px rgba(244, 67, 54, 0.7); }
        }

        .question-text {
            font-size: 1.6em;
            color: #263238;
            margin-bottom: 30px;
            line-height: 1.4;
        }

        .answers {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 25px;
        }

        .answer-btn {
            padding: 22px;
            border-radius: 20px;
            font-size: 1.2em;
            font-weight: 600;
            text-align: center;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            color: white;
        }

        .answer-btn.option-a { background: linear-gradient(135deg, #EF5350, #E53935); }
        .answer-btn.option-b { background: linear-gradient(135deg, #42A5F5, #1976D2); }
        .answer-btn.option-c { background: linear-gradient(135deg, #FFA726, #FB8C00); }
        .answer-btn.option-d { background: linear-gradient(135deg, #AB47BC, #8E24AA); }

        .answer-btn:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
        }

        .answer-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .answer-btn.selected {
            transform: scale(0.98);
            box-shadow: inset 0 4px 10px rgba(0, 0, 0, 0.2);
        }

        .personal-score {
            background: linear-gradient(135deg, #E3F2FD, #F5F5F5);
            padding: 20px;
            border-radius: 20px;
            text-align: center;
        }

        .score-label {
            color: #546E7A;
            font-size: 1em;
            margin-bottom: 8px;
        }

        .score-value {
            font-size: 2.5em;
            font-weight: bold;
            color: #1976D2;
        }

        #answerScreen {
            display: none;
            padding: 50px 40px;
            border-radius: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        #answerScreen.correct {
            background: linear-gradient(135deg, #66BB6A, #43A047);
        }

        #answerScreen.incorrect {
            background: linear-gradient(135deg, #EF5350, #E53935);
        }

        .result-icon {
            font-size: 6em;
            margin-bottom: 20px;
        }

        .result-text {
            color: white;
            font-size: 2em;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .result-score {
            color: white;
            font-size: 1.5em;
            opacity: 0.95;
        }

        /* Explanation Popup */
        .explanation-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: white;
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 90%;
            width: 450px;
            z-index: 1000;
            transition: transform 0.3s ease;
        }

        .explanation-popup.show {
            transform: translate(-50%, -50%) scale(1);
        }

        .explanation-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 999;
            display: none;
        }

        .explanation-overlay.show {
            display: block;
        }

        .explanation-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .explanation-title {
            color: #1976D2;
            font-size: 1.5em;
            font-weight: bold;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 1.5em;
            color: #546E7A;
            cursor: pointer;
            padding: 5px 10px;
            width: auto;
        }

        .explanation-text {
            color: #263238;
            font-size: 1.1em;
            line-height: 1.6;
            text-align: right;
        }

        #finishScreen {
            display: none;
        }

        .final-icon {
            font-size: 5em;
            margin-bottom: 20px;
        }

        .final-text {
            color: #1976D2;
            font-size: 2em;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .final-score {
            background: linear-gradient(135deg, #E3F2FD, #F5F5F5);
            padding: 30px;
            border-radius: 20px;
            margin-bottom: 20px;
        }

        .final-score-label {
            color: #546E7A;
            font-size: 1.2em;
            margin-bottom: 10px;
        }

        .final-score-value {
            font-size: 3.5em;
            font-weight: bold;
            color: #1976D2;
        }
    </style>
</head>
<body>
    <div class="gas-bubble"></div>
    <div class="gas-bubble"></div>

    <div class="container">
        <!-- Login Screen -->
        <div id="loginScreen" class="card">
            <div class="logo">💨</div>
            <h1>משחק טריוויה גז דחוס</h1>
            <div class="subtitle">
                <span class="n2-badge">N₂</span>
                <span>בטיחות ומודעות</span>
            </div>
            <input type="text" id="nameInput" placeholder="הזן את שמך" maxlength="20" />
            
            <div class="icon-selector">
                <label class="icon-selector-label">בחר אייקון:</label>
                <div class="icon-grid">
                    <div class="icon-option" data-icon="🎯">🎯</div>
                    <div class="icon-option" data-icon="🔬">🔬</div>
                    <div class="icon-option" data-icon="⚗️">⚗️</div>
                    <div class="icon-option" data-icon="🧪">🧪</div>
                    <div class="icon-option" data-icon="💨">💨</div>
                    <div class="icon-option" data-icon="🔥">🔥</div>
                </div>
            </div>
            
            <button id="joinBtn">הצטרף למשחק 🚀</button>
        </div>

        <!-- Waiting Screen -->
        <div id="waitingScreen" class="card">
            <h2 style="color: #1976D2; font-size: 2em; margin-bottom: 20px;">מחכים להתחלה...</h2>
            <div class="spinner"></div>
            <div class="waiting-text">המנחה יתחיל בקרוב</div>
        </div>

        <!-- Question Screen -->
        <div id="questionScreen" class="card">
            <div class="question-header">
                <span class="question-number" id="questionNumber">שאלה 1</span>
                <div class="timer-circle" id="timerCircle">
                    <span id="timerText">30</span>
                </div>
            </div>
            <div class="question-text" id="questionText"></div>
            <div class="answers" id="answersContainer"></div>
            <div class="personal-score">
                <div class="score-label">הניקוד שלך</div>
                <div class="score-value" id="myScore">0</div>
            </div>
        </div>

        <!-- Answer Screen -->
        <div id="answerScreen" class="card">
            <div class="result-icon" id="resultIcon"></div>
            <div class="result-text" id="resultText"></div>
            <div class="result-score" id="resultScore"></div>
        </div>

        <!-- Finish Screen -->
        <div id="finishScreen" class="card">
            <div class="final-icon">🎉</div>
            <div class="final-text">המשחק הסתיים!</div>
            <div class="final-score">
                <div class="final-score-label">הניקוד הסופי שלך</div>
                <div class="final-score-value" id="finalScore">0</div>
            </div>
            <div style="color: #546E7A; font-size: 1.2em;">תודה על ההשתתפות! 💙</div>
        </div>
    </div>

    <!-- Explanation Popup -->
    <div class="explanation-overlay" id="explanationOverlay"></div>
    <div class="explanation-popup" id="explanationPopup">
        <div class="explanation-header">
            <span class="explanation-title">💡 הסבר</span>
            <button class="close-btn" id="closeExplanation">✕</button>
        </div>
        <div class="explanation-text" id="explanationText"></div>
    </div>

    <!-- Audio -->
    <audio id="correctSound" src="https://assets.mixkit.co/active_storage/sfx/2018/2018-preview.mp3" preload="auto"></audio>
    <audio id="wrongSound" src="https://assets.mixkit.co/active_storage/sfx/2955/2955-preview.mp3" preload="auto"></audio>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBEju37qBBanjKxwHmKucVUQmzsXMpQuCs",
            authDomain: "gascompression-efbdb.firebaseapp.com",
            databaseURL: "https://gascompression-efbdb-default-rtdb.firebaseio.com",
            projectId: "gascompression-efbdb",
            storageBucket: "gascompression-efbdb.firebasestorage.app",
            messagingSenderId: "540508121351",
            appId: "1:540508121351:web:c8713d306b80a0009efda2"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const urlParams = new URLSearchParams(window.location.search);
        const gameId = urlParams.get('game');
        let playerId = null;
        let playerName = null;
        let playerIcon = '🎯';
        let currentScore = 0;

        if (!gameId) {
            alert('קישור לא תקין! סרוק את ה-QR שוב.');
        }

        // Icon selection
        document.querySelectorAll('.icon-option').forEach(icon => {
            icon.addEventListener('click', () => {
                document.querySelectorAll('.icon-option').forEach(i => i.classList.remove('selected'));
                icon.classList.add('selected');
                playerIcon = icon.dataset.icon;
            });
        });

        // Set default icon
        document.querySelector('.icon-option').classList.add('selected');

        // Join game
        document.getElementById('joinBtn').addEventListener('click', () => {
            const name = document.getElementById('nameInput').value.trim();
            if (!name) {
                alert('אנא הזן שם');
                return;
            }

            playerName = name;
            playerId = 'player_' + Date.now();

            db.ref(`games/${gameId}/players/${playerId}`).set({
                name: playerName,
                icon: playerIcon,
                score: 0,
                joinedAt: Date.now()
            });

            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('waitingScreen').style.display = 'block';

            db.ref(`games/${gameId}/state`).on('value', (snapshot) => {
                const state = snapshot.val();
                if (state && state.status === 'playing') {
                    listenToQuestions();
                } else if (state && state.status === 'finished') {
                    showFinishScreen();
                }
            });
        });

        function listenToQuestions() {
            db.ref(`games/${gameId}/state/currentQuestion`).on('value', (snapshot) => {
                const questionIndex = snapshot.val();
                if (questionIndex !== null) {
                    loadQuestion(questionIndex);
                }
            });
        }

        function loadQuestion(index) {
            db.ref(`games/${gameId}/questions/${index}`).once('value', (snapshot) => {
                const q = snapshot.val();
                if (!q) return;

                // סגירת popup אם פתוח
                closeExplanation();

                document.getElementById('waitingScreen').style.display = 'none';
                document.getElementById('questionScreen').style.display = 'block';
                document.getElementById('answerScreen').style.display = 'none';

                document.getElementById('questionNumber').textContent = `שאלה ${index + 1}`;
                document.getElementById('questionText').textContent = q.question;

                const answersContainer = document.getElementById('answersContainer');
                answersContainer.innerHTML = '';

                q.answers.forEach((answer, i) => {
                    const btn = document.createElement('button');
                    btn.className = `answer-btn option-${String.fromCharCode(97 + i)}`;
                    btn.textContent = answer;
                    btn.onclick = () => submitAnswer(index, i, q.correctAnswer, q.startTime, q.explanation);
                    answersContainer.appendChild(btn);
                });

                db.ref(`games/${gameId}/players/${playerId}/score`).on('value', (snap) => {
                    currentScore = snap.val() || 0;
                    document.getElementById('myScore').textContent = currentScore;
                });

                startTimer();
            });
        }

        function submitAnswer(questionIndex, answerIndex, correctAnswer, startTime, explanation) {
            const responseTime = Date.now() - startTime;
            const timeBonus = Math.max(0, 500 - Math.floor(responseTime / 60));
            const isCorrect = answerIndex === correctAnswer;
            const points = isCorrect ? 500 + timeBonus : 0;

            db.ref(`games/${gameId}/answers/${questionIndex}/${playerId}`).set({
                answer: answerIndex,
                time: responseTime,
                points: points,
                isCorrect: isCorrect
            });

            if (isCorrect) {
                db.ref(`games/${gameId}/players/${playerId}/score`).transaction((current) => {
                    return (current || 0) + points;
                });
            }

            document.querySelectorAll('.answer-btn').forEach(btn => {
                btn.disabled = true;
                if (btn.textContent === document.querySelectorAll('.answer-btn')[answerIndex].textContent) {
                    btn.classList.add('selected');
                }
            });

            if (navigator.vibrate) {
                navigator.vibrate([100]);
            }

            document.getElementById('questionScreen').style.display = 'none';
            document.getElementById('waitingScreen').style.display = 'block';
            document.querySelector('#waitingScreen h2').textContent = 'ממתינים לחשיפה...';
            document.querySelector('#waitingScreen .waiting-text').textContent = 'המנחה יחשוף בקרוב';

            // האזנה לחשיפה - צריך on כדי לתפוס גם אם כבר נחשף
            const revealRef = db.ref(`games/${gameId}/revealed/${questionIndex}`);
            revealRef.on('value', (revSnap) => {
                const revealed = revSnap.val();
                if (revealed) {
                    revealRef.off(); // מבטל האזנה אחרי שקיבלנו
                    showAnswerFeedback(isCorrect, points, explanation);
                }
            });
        }

        function showAnswerFeedback(isCorrect, points, explanation) {
            document.getElementById('waitingScreen').style.display = 'none';
            document.getElementById('answerScreen').style.display = 'block';

            const answerScreen = document.getElementById('answerScreen');
            answerScreen.className = 'card ' + (isCorrect ? 'correct' : 'incorrect');

            document.getElementById('resultIcon').textContent = isCorrect ? '✅' : '❌';
            document.getElementById('resultText').textContent = isCorrect ? 'תשובה נכונה!' : 'תשובה שגויה';
            document.getElementById('resultScore').textContent = isCorrect ? `+${points} נקודות` : 'אין נקודות';

            // Play sound
            if (isCorrect) {
                document.getElementById('correctSound').play();
            } else {
                document.getElementById('wrongSound').play();
            }

            // Show explanation popup
            setTimeout(() => {
                if (explanation) {
                    showExplanation(explanation);
                }
            }, 1000);
        }

        function showExplanation(text) {
            document.getElementById('explanationText').textContent = text;
            document.getElementById('explanationOverlay').classList.add('show');
            document.getElementById('explanationPopup').classList.add('show');
        }

        function closeExplanation() {
            document.getElementById('explanationOverlay').classList.remove('show');
            document.getElementById('explanationPopup').classList.remove('show');
        }

        document.getElementById('closeExplanation').addEventListener('click', closeExplanation);
        document.getElementById('explanationOverlay').addEventListener('click', closeExplanation);

        let timerInterval = null;
        function startTimer() {
            let timeLeft = 30;
            const circle = document.getElementById('timerCircle');
            const text = document.getElementById('timerText');

            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft--;
                text.textContent = timeLeft;

                circle.classList.remove('warning', 'danger');
                if (timeLeft <= 10 && timeLeft > 5) {
                    circle.classList.add('warning');
                } else if (timeLeft <= 5) {
                    circle.classList.add('danger');
                }

                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                }
            }, 1000);
        }

        function showFinishScreen() {
            clearInterval(timerInterval);
            closeExplanation();
            
            document.getElementById('waitingScreen').style.display = 'none';
            document.getElementById('questionScreen').style.display = 'none';
            document.getElementById('answerScreen').style.display = 'none';
            document.getElementById('finishScreen').style.display = 'block';

            db.ref(`games/${gameId}/players/${playerId}/score`).once('value', (snap) => {
                document.getElementById('finalScore').textContent = snap.val() || 0;
            });
        }
    </script>
</body>
</html>
